<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="miostile.css?v=20260513">
  <style>
    #upper_toolbar {
      margin: 2rem;
      border:1px solid grey;
      padding: 0.5rem 0.75rem;
      border-radius: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .message-tool {
      background-color: #f0f0f0;
      border-left: 3px solid #4a9eff;
      padding: 10px;
      margin: 5px 0;
      font-family: monospace;
      white-space: pre-wrap;
    }
    .dark .message-tool {
      background-color: #2d2d2d;
      border-left-color: #4a9eff;
    }
  </style>
</head>
<body>
<div id="upper_toolbar">
  <button id="new-chat-btn" class="new-chat-btn" title="New chat" type="button">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"></path><path d="m15 5 4 4"></path></svg>
  </button>
  <button id="provider-btn" type="button" style="width:15rem;text-align:left;font-size:1em">
    <span id="provider-label">Loading...</span>
    <span style="margin-left:3em"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m6 9 6 6 6-6"></path>
    </svg></span>
  </button>
  <button id="theme-toggle-btn" class="theme-toggle" type="button">Light</button>
</div>
  <div role="main" style="position: relative; display: flex; flex-direction: column; min-height: 100%;">
    <div class="chat-messages-wrapper" style="flex: 1; overflow-y: auto;">
      <div>
        <div class="mb-8 text-center">
          <h1>Hello there</h1>
          <p class="text-muted-foreground">Type a message to get started</p>
        </div>
      </div>
    </div>

    <div class="conversation-chat-form" style="flex-shrink: 0;">
      <div class="relative">
        <input type="file" multiple class="hidden">
        <form>
          
          <div data-slot="input-area">
            <div class="relative">
              <div class="flex">
                <textarea placeholder="Type a message..."></textarea>
              </div>
              <div style="display: flex; justify-content: flex-end; gap: 0.5rem;">
                <div style="display: none;">
                  <div>
                    <button data-slot="dropdown-menu-trigger" name="Attach files" id="bits-c42" aria-haspopup="menu" aria-expanded="false" data-state="closed" type="button">
                      <button data-slot="tooltip-trigger" class="file-upload-button" id="bits-c43" data-state="closed" data-delay-duration="500" tabindex="0" type="button">
                        <button data-slot="button" class="file-upload-button" type="button">
                          <span class="sr-only">Add files, prompts, tools or MCP Servers</span>
                          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-icon">
                            <path d="M5 12h14"></path>
                            <path d="M12 5v14"></path>
                          </svg>
                        </button>
                      </button>
                    </button>
                  </div>
                </div>

                <div id="model-selector-container">
                  <button id="model-selector-btn" type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-icon">
                      <path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"></path>
                      <path d="M12 22V12"></path>
                      <polyline points="3.29 7 12 12 20.71 7"></polyline>
                      <path d="m7.5 4.27 9 5.15"></path>
                    </svg>
                    <span id="model-selector-label">Select model</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-icon">
                      <path d="m6 9 6 6 6-6"></path>
                    </svg>
                  </button>
                  <button id="send-btn" type="submit" disabled>
                    <span class="sr-only">Send</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="m5 12 7-7 7 7"></path>
                      <path d="M12 19V5"></path>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    var isDark = false;
    var currentModel = null;
    var conversationHistory = [];
    var isProcessing = false;
    var availableTools = [];

    // ============ PATH NORMALIZATION ============
    function normalizePath(str) {
      // Sostituisce tutti i backslash con forward slash
      return str.replace(/\\/g, '/');
    }

    // System prompt that instructs the model how to use tools
    const SYSTEM_PROMPT = "You are an expert coding assistant. You have access to these tools:\n\nTool: read\nDescription: Read the content of a file. Supports offset/limit for pagination.\nParameters: file_path (required), offset (optional), limit (optional)\n\nTool: bash\nDescription: Execute a command in the current working directory. Returns stdout and stderr.\nParameters: command (required)\n\nIMPORTANT: When you need to read a file or run a command, you MUST call the tool and wait for the result. Do NOT try to read files or execute commands directly.";

    // ============ FETCH TOOLS FROM SERVER ============
    async function fetchTools() {
      try {
        const res = await fetch('http://localhost:8000/api/tools');
        availableTools = await res.json();
      } catch (e) {
        console.error('Failed to fetch tools:', e);
        availableTools = [];
      }
    }

    // ============ PROVIDER DROPDOWN ============
    const PROVIDER_DEFAULT = 'http://localhost:8080';
    var currentProvider = localStorage.getItem('provider') || PROVIDER_DEFAULT;
    var availableProviders = [];

    function initProvider() {
      document.getElementById('provider-label').textContent = currentProvider;
      fetchProviders();
    }

    async function fetchProviders() {
      try {
        const res = await fetch('http://localhost:8000/api/providers');
        const data = await res.json();
        availableProviders = data.providers || [PROVIDER_DEFAULT];
      } catch (e) {
        console.error('Failed to fetch providers:', e);
        availableProviders = [PROVIDER_DEFAULT];
      }
    }

    function getProviderUrl(path = '') {
      return currentProvider + (path.startsWith('/') ? path : '/' + path);
    }

    (function() {
      const btn = document.getElementById('provider-btn');
      const label = document.getElementById('provider-label');
      let isOpen = false;
      let dropdownEl = null;

      function createDropdown() {
        const dropdown = document.createElement('div');
        dropdown.className = 'provider-dropdown';
        
        const btnRect = btn.getBoundingClientRect();
        dropdown.style.position = 'fixed';
        dropdown.style.top = (btnRect.bottom + 4) + 'px';
        dropdown.style.left = btnRect.left + 'px';

        const listDiv = document.createElement('div');
        listDiv.style.padding = '0.25rem';
        
        availableProviders.forEach(provider => {
          const item = document.createElement('button');
          item.className = 'dropdown-item';
          item.style.display = 'flex';
          item.style.width = '100%';
          item.style.padding = '0.5rem';
          item.style.border = 'none';
          item.style.background = 'none';
          item.style.cursor = 'pointer';
          item.style.color = isDark ? '#f9fafb' : '#1f2937';
          item.style.fontSize = '0.75rem';
          item.style.borderRadius = '0.25rem';
          item.textContent = provider;
          if (provider === currentProvider) {
            item.style.backgroundColor = isDark ? '#333333' : '#e5e7eb';
          }
          item.addEventListener('mouseenter', () => {
            item.style.backgroundColor = isDark ? '#1a1a1a' : '#f3f4f6';
          });
          item.addEventListener('mouseleave', () => {
            item.style.backgroundColor = provider === currentProvider 
              ? (isDark ? '#333333' : '#e5e7eb') 
              : 'transparent';
          });
          item.addEventListener('click', () => selectProvider(provider));
          listDiv.appendChild(item);
        });
        
        dropdown.appendChild(listDiv);
        return dropdown;
      }

      function openDropdown() {
        dropdownEl = createDropdown();
        document.body.appendChild(dropdownEl);
        isOpen = true;
        btn.setAttribute('aria-expanded', 'true');
      }

      function closeDropdown() {
        if (dropdownEl) {
          dropdownEl.remove();
          dropdownEl = null;
        }
        isOpen = false;
        btn.setAttribute('aria-expanded', 'false');
      }

      function selectProvider(provider) {
        currentProvider = provider;
        localStorage.setItem('provider', provider);
        label.textContent = provider;
        closeDropdown();
        addChatMessage('system', 'Provider changed to: ' + provider);
        // Fetch models for new provider
        window.dispatchEvent(new CustomEvent('provider-changed', { detail: provider }));
      }

      function handleClick(e) {
        if (!dropdownEl?.contains(e.target) && !btn.contains(e.target)) {
          closeDropdown();
        }
      }

      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isOpen) closeDropdown();
        else openDropdown();
      });

      document.addEventListener('click', handleClick);
      initProvider();
    })();

    // Fetch tools on page load
    fetchTools();

    // New chat button handler
    document.getElementById('new-chat-btn').addEventListener('click', () => {
      conversationHistory = [];
      initConversation();
      // Clear chat messages from DOM
      const chatDiv = document.querySelector('.chat-messages');
      if (chatDiv) chatDiv.remove();
      // Show welcome message
      const h1 = document.querySelector('[role="main"] h1');
      const p = document.querySelector('[role="main"] p');
      if (h1) h1.style.display = '';
      if (p) p.style.display = '';
    });

    function initConversation() {
      // Ensure system prompt exists but don't add duplicates
      const hasSystem = conversationHistory.some(m => m.role === 'system');
      if (!hasSystem) {
        conversationHistory.splice(0, 0, { role: 'system', content: SYSTEM_PROMPT });
      }
    }

    // ============ THEME TOGGLE ============
    function initTheme() {
      // Check saved preference
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        isDark = true;
        document.documentElement.classList.add('dark');
      }
    }

    // Theme toggle
    function toggleTheme() {
      isDark = !isDark;
      if (isDark) {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      }
      // Update dropdown colors if open
      const dropdown = document.querySelector('.dropdown');
      if (dropdown) {
        const items = dropdown.querySelectorAll('.dropdown-item');
        const names = dropdown.querySelectorAll('.dropdown-item .name');
        const color = isDark ? '#f9fafb' : '#1f2937';
        items.forEach(item => item.style.color = color);
        names.forEach(name => name.style.color = color);
      }
      // Update button text
      const themeBtn = document.getElementById('theme-toggle-btn');
      if (themeBtn) themeBtn.textContent = isDark ? 'Light' : 'Dark';
    }

    // Initialize
    initTheme();
    document.getElementById('theme-toggle-btn')?.addEventListener('click', toggleTheme);

    // ============ FILE UPLOAD HANDLING ============
    (function() {
      const dropZone = document.querySelector('[role="main"]');
      const fileInput = dropZone?.querySelector('input[type="file"]');
      const uploadButton = dropZone?.querySelector('.file-upload-button');

      if (uploadButton && fileInput) {
        uploadButton.addEventListener('click', () => fileInput.click());
      }

      if (dropZone && fileInput) {
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
          dropZone.addEventListener(eventName, e => {
            e.preventDefault();
            e.stopPropagation();
          });
        });

        ['dragenter', 'dragover'].forEach(eventName => {
          dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-over'));
        });

        ['dragleave', 'drop'].forEach(eventName => {
          dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-over'));
        });

        dropZone.addEventListener('drop', e => {
          const files = e.dataTransfer.files;
          if (files.length > 0) {
            fileInput.files = files;
            fileInput.dispatchEvent(new Event('change', { bubbles: true }));
          }
        });
      }
    })();

    // ============ CHAT FORM HANDLER ============
    (function() {
      const chatForm = document.querySelector('.conversation-chat-form form');
      const chatInput = chatForm?.querySelector('textarea');
      const sendBtn = chatForm?.querySelector('button[type="submit"]');

      if (chatForm && chatInput && sendBtn) {
        // Handle form submit (Enter key)
        chatForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const message = chatInput.value.trim();
          if (!message) return;
          chatInput.value = '';
          await sendMessage(message);
        });

        // Handle button click directly
        sendBtn.addEventListener('click', async (e) => {
          e.preventDefault();
          const message = chatInput.value.trim();
          if (!message) return;
          chatInput.value = '';
          await sendMessage(message);
        });

        // Handle Enter key in textarea
        chatInput.addEventListener('keydown', async (e) => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;
            chatInput.value = '';
            await sendMessage(message);
          }
        });

        // Enable/disable based on input
        chatInput.addEventListener('input', () => {
          const hasText = chatInput.value.trim().length > 0;
          sendBtn.disabled = !hasText;
        });
      }
    })();

    // ============ ADD CHAT MESSAGE ============
    function addChatMessage(role, content) {
      const mainDiv = document.querySelector('[role="main"]');
      const wrapper = mainDiv?.querySelector('.chat-messages-wrapper');

      // Hide welcome message
      const h1 = mainDiv?.querySelector('h1');
      if (h1) h1.style.display = 'none';
      const p = mainDiv?.querySelector('p');
      if (p) p.style.display = 'none';

      let chatDiv = wrapper?.querySelector('.chat-messages');
      if (!chatDiv) {
        chatDiv = document.createElement('div');
        chatDiv.className = 'chat-messages';
        if (wrapper) {
          wrapper.insertBefore(chatDiv, wrapper.firstChild);
        }
      }

      const msgDiv = document.createElement('div');
      msgDiv.className = 'flex justify-start';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble ' +
        (role === 'user' ? 'message-user' :
          role === 'system' ? 'message-system' :
          role === 'tool' ? 'message-tool' :
          'message-assistant');
      bubble.textContent = content;

      msgDiv.appendChild(bubble);
      chatDiv.appendChild(msgDiv);
      
      // Scroll the wrapper, not the main container
      if (wrapper) {
        wrapper.scrollTo({ top: wrapper.scrollHeight, behavior: 'smooth' });
      }

      // Restituisci il bubble per aggiornarlo dopo in streaming
      return bubble;
    }

    // ============ TOOL EXECUTION ============
    async function executeTool(name, args) {
      try {
        const res = await fetch('http://localhost:8000/api/' + name, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(args)
        });
        const text = await res.text();
        try {
          return JSON.parse(text);
        } catch(e) {
          return { content: text };
        }
      } catch (e) {
        return { error: e.message };
      }
    }

    // ============ SEND MESSAGE (with tool calling) ============
    async function sendMessage(message) {
      if (isProcessing) return;
      isProcessing = true;

      // Normalizza i backslash in slash nel messaggio dell'utente
      message = normalizePath(message);

      if (message) {
        conversationHistory.push({ role: 'user', content: message });
        addChatMessage('user', message);
      }

      // Main loop: continues until there are no more tool calls
      while (true) {
        initConversation();
        const aiBubble = addChatMessage('assistant', '...');
        let aiBuffer = '';
        let toolCallsCollected = [];

        try {
          const response = await fetch('http://localhost:8000/v1/chat/completions?provider=' + currentProvider, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: currentModel,
              messages: conversationHistory,
              stream: true,
              tools: availableTools
            })
          });

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let pending = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const data = pending + decoder.decode(value);
            pending = '';
            const lines = data.split('\n');

            for (let i = 0; i < lines.length - 1; i++) {
              const line = lines[i].trim();
              if (line.startsWith('data: ')) {
                const jsonStr = line.slice(6);
                if (jsonStr === '[DONE]') break;
                try {
                  const chunk = JSON.parse(jsonStr);
                  const delta = chunk.choices?.[0]?.delta;
                  if (!delta) continue;


                  // Handle content tokens
                  if (delta.content) {
                    aiBuffer += delta.content;
                    if (aiBubble) {
                      aiBubble.textContent = aiBuffer;
                      // Auto-scroll during streaming
                      const wrapper = document.querySelector('.chat-messages-wrapper');
                      if (wrapper) {
                        wrapper.scrollTo({ top: wrapper.scrollHeight, behavior: 'instant' });
                      }
                    }
                  }

                  // Handle tool calls
                  if (delta.tool_calls && delta.tool_calls.length > 0) {
                    for (const tc of delta.tool_calls) {
                      const idx = tc.index;
                      while (toolCallsCollected.length <= idx) {
                        toolCallsCollected.push({
                          id: null,
                          type: 'function',
                          function: { name: '', arguments: '' }
                        });
                      }
                      const target = toolCallsCollected[idx];
                      if (tc.id) target.id = tc.id;
                      if (tc.function?.name) target.function.name = tc.function.name;
                      if (tc.function?.arguments) {
                        target.function.arguments += tc.function.arguments;
                      }
                    }
                  }
                } catch(e) {}
              }
            }

            if (!data.endsWith('\n')) {
              pending = lines[lines.length - 1];
            }
          }

          // After streaming ends, check for tool calls
          if (toolCallsCollected.length > 0) {
            // Add assistant message with tool calls
            const assistantContent = aiBuffer.length > 0 ? aiBuffer : 'Then I will answer and show any content...';
            conversationHistory.push({
              role: 'assistant',
              content: assistantContent,
              tool_calls: toolCallsCollected
            });

            // Execute each tool and add results to history
            for (const tc of toolCallsCollected) {
              const toolName = tc.function.name;
              let toolArgs = {};
              try {
                toolArgs = JSON.parse(tc.function.arguments);
              } catch(e) { toolArgs = {}; }
              const toolId = tc.id;

              addChatMessage('system', 'Tool Call -> ' + toolName + '(' + tc.function.arguments + ')');

              const result = await executeTool(toolName, toolArgs);
              let content = '';

              // Extract content from result, ensuring it's a string
              if (result.content !== undefined) {
                content = typeof result.content === 'string' ? result.content : JSON.stringify(result.content);
                if (result.exit_code && result.exit_code !== '0') {
                  content = '[Exit code: ' + result.exit_code + ']\n' + content;
                }
              } else if (result.error) {
                content = 'Error: ' + result.error;
              } else {
                // If no content field, use the stringified result (fallback)
                content = JSON.stringify(result);
              }

              // Format and display tool result like TUI (--- and ***Title***)
              const toolTitle = (toolName === 'read' && toolArgs.file_path) ? toolArgs.file_path : toolName;
              const formattedResult = `--- \n ***${toolTitle}***: \n ${content}`;
              addChatMessage('tool', formattedResult);

              conversationHistory.push({
                role: 'tool',
                tool_call_id: toolId,
                name: toolName,
                content: content
              });
            }

            // Continue loop to send tool results back to model
            continue;
          } else {
            // No tool calls, normal response complete
            if (aiBuffer.length > 0) {
              // Clean response: if it's JSON with a content field, extract it
              let finalContent = aiBuffer;
              try {
                const parsed = JSON.parse(aiBuffer);
                if (parsed.content) {
                  finalContent = parsed.content;
                  // Update the displayed bubble to show cleaned content
                  if (aiBubble) aiBubble.textContent = finalContent;
                }
              } catch(e) {
                // Not JSON, keep original
              }
              conversationHistory.push({ role: 'assistant', content: finalContent });
            }
            break;
          }
        } catch (e) {
          if (aiBubble) aiBubble.textContent = 'Error: ' + e.message;
          break;
        }
      }

      isProcessing = false;
    }

    // ============ MODEL SELECTOR DROPDOWN ============
    (function() {
      const btn = document.getElementById('model-selector-btn');
      const label = document.getElementById('model-selector-label');

      let models = [];
      let selectedModel = null;
      let isOpen = false;
      let dropdownEl = null;
      let modelsLoaded = false;

      async function fetchModels() {
        try {
          label.textContent = 'Loading...';
          // Pass provider WITHOUT encoding (server will handle it)
          const res = await fetch(`http://localhost:8000/api/models?provider=${currentProvider}`);
          const data = await res.json();
          
          // Save selection BEFORE updating models array
          const prevSelected = currentModel || selectedModel;
          
          models = data.data || [];
          modelsLoaded = true;

          // Now find the currently loaded model from server response
          let foundLoadedModel = null;
          for (const m of models) {
            if (m.status?.value === 'loaded') {
              foundLoadedModel = m.id;
              break;
            }
          }

          // Determine what to show as selected:
          // 1. If server says a model is loaded, use that
          // 2. Otherwise keep our previous selection
          // 3. Otherwise show nothing
          if (foundLoadedModel) {
            currentModel = foundLoadedModel;
            selectedModel = foundLoadedModel;
            label.textContent = foundLoadedModel;
          } else if (prevSelected) {
            currentModel = prevSelected;
            selectedModel = prevSelected;
            label.textContent = prevSelected;
          } else {
            currentModel = null;
            selectedModel = null;
            label.textContent = 'Select model';
          }
        } catch (e) {
          console.error('Failed to fetch models:', e);
          label.textContent = 'Select model';
          models = [];
        }
      }

      // Fetch models on page load
      fetchModels();

      function createDropdown() {
        const dropdown = document.createElement('div');
        dropdown.className = 'dropdown';

        const btnRect = btn.getBoundingClientRect();
        // Open upward - position above the button
        dropdown.style.position = 'absolute';
        dropdown.style.bottom = (window.innerHeight - btnRect.top + 10) + 'px';
        dropdown.style.left = btnRect.left + 'px';
        dropdown.style.top = 'auto';

        // Search
        const searchDiv = document.createElement('div');
        searchDiv.className = 'dropdown-search';
        const searchInput = document.createElement('input');
        searchInput.type = 'text';
        searchInput.placeholder = 'Search models...';
        searchInput.addEventListener('input', (e) => renderList(e.target.value));
        searchDiv.appendChild(searchInput);
        dropdown.appendChild(searchDiv);

        // List
        const listDiv = document.createElement('div');
        listDiv.className = 'dropdown-list';
        listDiv.id = 'models-list';
        dropdown.appendChild(listDiv);

        const closeHandler = (e) => {
          if (!dropdown.contains(e.target) && !btn.contains(e.target)) closeDropdown();
        };
        setTimeout(() => document.addEventListener('click', closeHandler), 0);

        return dropdown;
      }

      function renderList(filter = '') {
        if (!dropdownEl) return;
        const listContainer = dropdownEl.querySelector('#models-list');
        if (!listContainer) return;

        listContainer.innerHTML = '';

        const filtered = models.filter(m => m.id.toLowerCase().includes(filter.toLowerCase()));

        if (filtered.length === 0) {
          const empty = document.createElement('p');
          empty.className = 'dropdown-empty';
          empty.textContent = 'No models found';
          listContainer.appendChild(empty);
          return;
        }

        filtered.forEach(model => {
          const item = document.createElement('button');
          item.className = 'dropdown-item';
          item.style.color = isDark ? '#f9fafb' : '#1f2937';
          if (model.id === selectedModel) item.classList.add('selected');

          const status = document.createElement('span');
          status.className = 'status';
          const modelStatus = model.status?.value || 'unloaded';
          if (modelStatus === 'loaded') status.classList.add('loaded');
          else if (modelStatus === 'loading') status.classList.add('loading');
          else status.classList.add('unloaded');
          item.appendChild(status);

          const name = document.createElement('span');
          name.className = 'name';
          name.textContent = model.id;
          name.style.color = isDark ? '#f9fafb' : '#1f2937';
          item.appendChild(name);

          item.addEventListener('click', () => selectModel(model.id));
          listContainer.appendChild(item);
        });
      }

      function openDropdown() {
        dropdownEl = createDropdown();
        document.body.appendChild(dropdownEl);
        isOpen = true;
        btn.setAttribute('aria-expanded', 'true');
        btn.setAttribute('data-state', 'open');
        // Render list immediately
        renderList();
      }

      function closeDropdown() {
        if (dropdownEl) {
          dropdownEl.remove();
          dropdownEl = null;
        }
        isOpen = false;
        btn.setAttribute('aria-expanded', 'false');
        btn.setAttribute('data-state', 'closed');
      }

      async function selectModel(modelId) {
        selectedModel = modelId;
        currentModel = modelId;
        label.textContent = modelId;

        const foundModel = models.find(m => m.id === modelId);
        const isLoaded = foundModel?.status?.value === 'loaded';

        if (isLoaded) {
          addChatMessage('system', 'OK Model already loaded: ' + modelId);
          closeDropdown();
          return;
        }

        addChatMessage('system', 'Loading model: ' + modelId + '...');

        // Close dropdown immediately
        closeDropdown();

        try {
          // Use proxy endpoint to avoid CORS
          const response = await fetch('http://localhost:8000/v1/embeddings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: 'test', model: modelId })
          });

          if (response.ok) {
            addChatMessage('system', 'OK Model loaded: ' + modelId);
          } else {
            addChatMessage('system', 'OK Model selected: ' + modelId);
          }
          await fetchModels();
        } catch (e) {
          addChatMessage('system', 'OK Model selected: ' + modelId);
        }
      }

      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (isOpen) {
          closeDropdown();
        } else {
          if (!modelsLoaded) {
            await fetchModels();
          }
          if (models.length > 0) {
            openDropdown();
          }
        }
      });

      btn.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowDown' || e.key === 'Enter') {
          e.preventDefault();
          if (!modelsLoaded) fetchModels().then(openDropdown);
          else openDropdown();
        }
      });

      // Listen for provider changes
      window.addEventListener('provider-changed', async () => {
        modelsLoaded = false;
        selectedModel = null;
        currentModel = null;
        models = [];
        await fetchModels();
      });
    })();
  </script>
</html>

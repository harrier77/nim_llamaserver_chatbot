                      <path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"></path>

</div><!-- 0 --> 
  <script>
    var isDark = false;
    var currentModel = null;
    var conversationHistory = [];
    var isProcessing = false;
    var availableTools = [];

    // ============ PATH NORMALIZATION ============
    function normalizePath(str) {
      // Sostituisce tutti i backslash con forward slash
      return str.replace(/\\/g, '/');
    }

    // System prompt that instructs the model how to use tools
    var SYSTEM_PROMPT = "";

    // ============ FETCH WITH TIMEOUT ============
    async function fetchWithTimeout(url, options, timeoutMs) {
      timeoutMs = timeoutMs || 5000;
      const controller = new AbortController();
      const timer = setTimeout(function() { controller.abort(); }, timeoutMs);
      try {
        const res = await fetch(url, Object.assign({}, options, { signal: controller.signal }));
        return res;
      } finally {
        clearTimeout(timer);
      }
    }

    // ============ FETCH SYSTEM PROMPT FROM SERVER ============
    async function fetchSystemPrompt() {
      try {
        const res = await fetchWithTimeout('/api/system-prompt', {}, 5000);
        const data = await res.json();
        SYSTEM_PROMPT = data.content || '';
      } catch (e) {
        console.error('Failed to fetch system prompt:', e);
        SYSTEM_PROMPT = '';
      }
    }

    // ============ FETCH TOOLS FROM SERVER ============
    async function fetchTools() {
      try {
        const res = await fetchWithTimeout('/api/tools', {}, 5000);
        availableTools = await res.json();
      } catch (e) {
        console.error('Failed to fetch tools:', e);
        availableTools = [];
      }
    }

    // ============ PROVIDER DROPDOWN ============
    const PROVIDER_DEFAULT = 'http://localhost:8080';
    var currentProvider = localStorage.getItem('provider') || PROVIDER_DEFAULT;
    var availableProviders = [];

    console.log('[DEBUG] PROVIDER_DEFAULT:', PROVIDER_DEFAULT);
    console.log('[DEBUG] localStorage provider:', localStorage.getItem('provider'));
    console.log('[DEBUG] currentProvider init:', currentProvider);

    function getProviderLabel(url) {
      var pObj = availableProviders.find(function(p) { return p.baseUrl === url; });
      return pObj ? pObj.name : url;
    }

    function getProviderObj(url) {
      return availableProviders.find(function(p) { return p.baseUrl === url; }) || null;
    }

    function updateProviderBadge(pObj) {
      var isRemoteProvider = pObj ? pObj.isRemote : false;
      var host = window.location.hostname;
      var isRemoteHost = host !== 'localhost' && host !== '127.0.0.1' && host !== '[::1]';
      document.getElementById('provider-remote-badge').style.display =
        (isRemoteProvider || isRemoteHost) ? 'inline' : 'none';
    }

    function initProvider() {
      var label = getProviderLabel(currentProvider);
      document.getElementById('provider-label').textContent = label;
      updateProviderBadge(getProviderObj(currentProvider));
      fetchProviders();
    }

    async function fetchProviders() {
      try {
        const res = await fetchWithTimeout('/api/providers', {}, 5000);
        const data = await res.json();
        availableProviders = data.providers || [];
        // Update label with friendly name now that providers are loaded
        var label = getProviderLabel(currentProvider);
        document.getElementById('provider-label').textContent = label;
        updateProviderBadge(getProviderObj(currentProvider));
      } catch (e) {
        console.error('[DEBUG] fetchProviders FAILED:', e.message);
        availableProviders = [];
      }
    }

    function getProviderUrl(path = '') {
      return currentProvider + (path.startsWith('/') ? path : '/' + path);
    }

    (function() {
      const btn = document.getElementById('provider-btn');
      const label = document.getElementById('provider-label');
      let isOpen = false;
      let dropdownEl = null;

      function promptCustomUrl() {
        closeDropdown();
        var url = prompt('Enter provider URL:', 'http://');
        if (url && url.trim()) {
          selectProvider(url.trim());
        }
      }

      function createDropdown() {
        const dropdown = document.createElement('div');
        dropdown.className = 'provider-dropdown';
        
        const btnRect = btn.getBoundingClientRect();
        dropdown.style.position = 'fixed';
        dropdown.style.top = (btnRect.bottom + 4) + 'px';
        dropdown.style.left = btnRect.left + 'px';

        const listDiv = document.createElement('div');
        listDiv.style.padding = '0.25rem';
        
        // Build display list: ensure currentProvider is included even if not in availableProviders
        var displayList = availableProviders.slice();
        var isCurrentInList = displayList.some(function(p) { return p.baseUrl === currentProvider; });
        if (currentProvider && !isCurrentInList) {
          displayList.splice(displayList.length - 1, 0, {
            name: currentProvider,
            baseUrl: currentProvider,
            isRemote: false,
            source: 'manual',
            hasApiKey: false,
            modelsKnown: false
          });
        }
        
        displayList.forEach(function(providerObj) {
          const item = document.createElement('button');
          item.className = 'dropdown-item';
          item.style.display = 'flex';
          item.style.width = '100%';
          item.style.padding = '0.5rem';
          item.style.border = 'none';
          item.style.background = 'none';
          item.style.cursor = 'pointer';
          item.style.color = isDark ? '#f9fafb' : '#1f2937';
          item.style.fontSize = '0.85rem';
          item.style.borderRadius = '0.25rem';
          item.style.textAlign = 'left';
          item.style.alignItems = 'center';
          item.style.gap = '0.5rem';
          
          if (providerObj.source === 'custom') {
            item.textContent = providerObj.name;
            item.style.fontStyle = 'italic';
            item.style.opacity = '0.8';
            item.addEventListener('click', promptCustomUrl);
          } else {
            var displayName = providerObj.name + '  →  ' + providerObj.baseUrl;
            item.textContent = displayName;
            if (providerObj.baseUrl === currentProvider) {
              item.style.backgroundColor = isDark ? '#333333' : '#e5e7eb';
            }
            if (providerObj.isRemote) {
              var badge = document.createElement('span');
              badge.textContent = 'remote';
              badge.style.fontSize = '0.8em';
              badge.style.padding = '1px 4px';
              badge.style.borderRadius = '3px';
              badge.style.background = '#e53e3e';
              badge.style.color = '#fff';
              badge.style.fontWeight = 'bold';
              badge.style.marginLeft = '4px';
              item.appendChild(badge);
            }
            if (providerObj.modelsKnown) {
              var modelCount = document.createElement('span');
              modelCount.textContent = '(' + providerObj.models.length + ' models)';
              modelCount.style.fontSize = '0.6em';
              modelCount.style.opacity = '0.6';
              modelCount.style.marginLeft = '4px';
              item.appendChild(modelCount);
            }
            item.addEventListener('click', function(url) {
              return function() { selectProvider(url); };
            }(providerObj.baseUrl));
          }
          
          item.addEventListener('mouseenter', () => {
            item.style.backgroundColor = isDark ? '#1a1a1a' : '#f3f4f6';
          });
          item.addEventListener('mouseleave', () => {
            if (providerObj.source !== 'custom' && providerObj.baseUrl === currentProvider) {
              item.style.backgroundColor = isDark ? '#333333' : '#e5e7eb';
            } else {
              item.style.backgroundColor = 'transparent';
            }
          });
          
          listDiv.appendChild(item);
        });
        
        dropdown.appendChild(listDiv);
        return dropdown;
      }

      function openDropdown() {
        dropdownEl = createDropdown();
        document.body.appendChild(dropdownEl);
        isOpen = true;
        btn.setAttribute('aria-expanded', 'true');
      }

      function closeDropdown() {
        if (dropdownEl) {
          dropdownEl.remove();
          dropdownEl = null;
        }
        isOpen = false;
        btn.setAttribute('aria-expanded', 'false');
      }

      function selectProvider(provider) {
        console.log('[DEBUG] selectProvider() ->', provider);
        // Normalizza: rimuove slash finale per evitare // nel target URL
        provider = provider.replace(/\/$/, '');
        currentProvider = provider;
        localStorage.setItem('provider', provider);
        var pObj = getProviderObj(provider);
        var displayLabel = pObj ? pObj.name : provider;
        label.textContent = displayLabel;
        updateProviderBadge(pObj);
        closeDropdown();
        addChatMessage('system', 'Provider changed to: ' + displayLabel + ' (' + provider + ')');
        // Fetch models for new provider
        window.dispatchEvent(new CustomEvent('provider-changed', { detail: provider }));
      }

      function handleClick(e) {
        if (!dropdownEl?.contains(e.target) && !btn.contains(e.target)) {
          closeDropdown();
        }
      }

      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isOpen) closeDropdown();
        else openDropdown();
      });

      document.addEventListener('click', handleClick);
      initProvider();
    })();

    // Fetch tools and system prompt on page load
    fetchTools();
    fetchSystemPrompt();

    // New chat button handler
    document.getElementById('new-chat-btn').addEventListener('click', () => {
      conversationHistory = [];
      initConversation();
      // Clear chat messages from DOM
      const chatDiv = document.querySelector('.chat-messages');
      if (chatDiv) chatDiv.remove();
      // Show welcome message
      const h2 = document.querySelector('[role="main"] h2');
      const p = document.querySelector('[role="main"] p');
      if (h2) h2.style.display = '';
      if (p) p.style.display = '';
    });

    function initConversation() {
      // Ensure system prompt exists but don't add duplicates
      const hasSystem = conversationHistory.some(m => m.role === 'system');
      if (!hasSystem) {
        conversationHistory.splice(0, 0, { role: 'system', content: SYSTEM_PROMPT });
      }
    }

    // ============ THEME TOGGLE ============
    function initTheme() {
      // Check saved preference
      const savedTheme = localStorage.getItem('theme');
      const themeBtn = document.getElementById('theme-toggle-btn');
      if (savedTheme === 'dark') {
        isDark = true;
        document.documentElement.classList.add('dark');
        if (themeBtn) themeBtn.textContent = 'Light';
      } else {
        isDark = false;
        document.documentElement.classList.remove('dark');
        if (themeBtn) themeBtn.textContent = 'Dark';
      }
    }

    // Theme toggle
    function toggleTheme() {
      isDark = !isDark;
      if (isDark) {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      }
      // Update dropdown colors if open
      const dropdown = document.querySelector('.dropdown');
      if (dropdown) {
        const items = dropdown.querySelectorAll('.dropdown-item');
        const names = dropdown.querySelectorAll('.dropdown-item .name');
        const color = isDark ? '#f9fafb' : '#1f2937';
        items.forEach(item => item.style.color = color);
        names.forEach(name => name.style.color = color);
      }
      // Update button text
      const themeBtn = document.getElementById('theme-toggle-btn');
      if (themeBtn) themeBtn.textContent = isDark ? 'Light' : 'Dark';
    }

    // ============ LAUNCH LLAMA BUTTON ============
    document.getElementById('launch-llama-btn').addEventListener('click', async () => {
      const btn = document.getElementById('launch-llama-btn');
      const label = document.getElementById('llama-btn-label');
      btn.disabled = true;
      label.textContent = 'Launching...';
      try {
        const res = await fetch('/api/launch-llama');
        const data = await res.json();
        if (data.ok) {
          label.textContent = '✅ Launched';
          addChatMessage('system', 'Llama server launched');
        }
      } catch (e) {
        label.textContent = '❌ Error';
        console.error('Failed to launch llama:', e);
      }
      setTimeout(() => {
        btn.disabled = false;
        label.textContent = 'Llama';
      }, 3000);
    });

    // Initialize
    initTheme();
    document.getElementById('theme-toggle-btn')?.addEventListener('click', toggleTheme);

    // ============ FILE UPLOAD HANDLING ============
    (function() {
      const dropZone = document.querySelector('[role="main"]');
      const fileInput = dropZone?.querySelector('input[type="file"]');
      const uploadButton = dropZone?.querySelector('.file-upload-button');

      if (uploadButton && fileInput) {
        uploadButton.addEventListener('click', () => fileInput.click());
      }

      if (dropZone && fileInput) {
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
          dropZone.addEventListener(eventName, e => {
            e.preventDefault();
            e.stopPropagation();
          });
        });

        ['dragenter', 'dragover'].forEach(eventName => {
          dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-over'));
        });

        ['dragleave', 'drop'].forEach(eventName => {
          dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-over'));
        });

        dropZone.addEventListener('drop', e => {
          const files = e.dataTransfer.files;
          if (files.length > 0) {
            fileInput.files = files;
            fileInput.dispatchEvent(new Event('change', { bubbles: true }));
          }
        });
      }
    })();

    // ============ CHAT FORM HANDLER ============
    (function() {
      const chatForm = document.querySelector('.conversation-chat-form form');
      const chatInput = chatForm?.querySelector('textarea');
      const sendBtn = chatForm?.querySelector('button[type="submit"]');

      if (chatForm && chatInput && sendBtn) {
        // Handle form submit (Enter key)
        chatForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const message = chatInput.value.trim();
          if (!message) return;
          chatInput.value = '';
          await sendMessage(message);
        });

        // Handle button click directly
        sendBtn.addEventListener('click', async (e) => {
          e.preventDefault();
          const message = chatInput.value.trim();
          if (!message) return;
          chatInput.value = '';
          await sendMessage(message);
        });

        // Handle Enter key in textarea
        chatInput.addEventListener('keydown', async (e) => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;
            chatInput.value = '';
            await sendMessage(message);
          }
        });

        // Enable/disable based on input
        chatInput.addEventListener('input', () => {
          const hasText = chatInput.value.trim().length > 0;
          sendBtn.disabled = !hasText;
        });
      }
    })();

    // ============ ADD CHAT MESSAGE ============
    function addChatMessage(role, content) {
      const mainDiv = document.querySelector('[role="main"]');
      const wrapper = mainDiv?.querySelector('.chat-messages-wrapper');

      // Hide welcome message
      const h2 = mainDiv?.querySelector('h2');
      if (h2) h2.style.display = 'none';
      const p = mainDiv?.querySelector('p');
      if (p) p.style.display = 'none';

      let chatDiv = wrapper?.querySelector('.chat-messages');
      if (!chatDiv) {
        chatDiv = document.createElement('div');
        chatDiv.className = 'chat-messages';
        if (wrapper) {
          wrapper.insertBefore(chatDiv, wrapper.firstChild);
        }
      }

      const msgDiv = document.createElement('div');
      msgDiv.className = 'flex justify-start';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble ' +
        (role === 'user' ? 'message-user' :
          role === 'system' ? 'message-system' :
          role === 'tool' ? 'message-tool' :
          'message-assistant');
      bubble.innerHTML = content.replace(/\n/g, '<br/>');

      msgDiv.appendChild(bubble);
      chatDiv.appendChild(msgDiv);
      
      // Scroll the wrapper, not the main container
      if (wrapper) {
        wrapper.scrollTo({ top: wrapper.scrollHeight, behavior: 'smooth' });
      }

      // Restituisci il bubble per aggiornarlo dopo in streaming
      return bubble;
    }

    // ============ TOOL EXECUTION ============
    async function executeTool(name, args) {
      try {
        const res = await fetch('/api/execute-tool', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name, arguments: args })
        });
        const text = await res.text();
        try {
          return JSON.parse(text);
        } catch(e) {
          return { content: text };
        }
      } catch (e) {
        return { error: e.message };
      }
    }

    // ============ SEND MESSAGE (with tool calling) ============
    async function sendMessage(message) {
      if (isProcessing) return;
      isProcessing = true;

      // Normalizza i backslash in slash nel messaggio dell'utente
      message = normalizePath(message);

      if (message) {
        conversationHistory.push({ role: 'user', content: message });
        addChatMessage('user', message);
      }

      console.log('[DEBUG sendMessage] ENTER provider=' + currentProvider + ' model=' + currentModel + ' msgLen=' + (message?message.length:0));

      // Main loop: continues until there are no more tool calls
      while (true) {
        initConversation();
        const aiBubble = addChatMessage('assistant', '...');
        // Poll llama-server log to show model loading progress instead of "..."
        const logInterval = setInterval(async () => {
          try {
            const r = await fetch('/api/llama-log');
            const d = await r.json();
            if (d.lines && d.lines.length > 0) {
              aiBubble.innerHTML = d.lines.map(l => l.replace(/\n/g, '<br/>')).join('<br/>');
            }
          } catch(e) {}
        }, 1500);
        
        let aiBuffer = '';
        let toolCallsCollected = [];

        try {
          const chatUrl = '/v1/chat/completions?provider=' + encodeURIComponent(currentProvider);
          const requestBody = {
            model: currentModel,
            messages: conversationHistory,
            stream: true,
            tools: availableTools
          };
          //console.log('[DEBUG sendMessage] === FULL REQUEST DUMP ===');
          //console.log('[DEBUG sendMessage] URL:', chatUrl);
          //console.log('[DEBUG sendMessage] PROVIDER detail:', JSON.stringify(getProviderObj(currentProvider)));
          //console.log('[DEBUG sendMessage] REQUEST BODY:', JSON.stringify(requestBody, null, 2));
          //console.log('[DEBUG sendMessage] === END REQUEST DUMP ===');
          const response = await fetch(chatUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
          });
          console.log('[DEBUG sendMessage] FETCH done status=' + response.status + ' ' + response.statusText + ' ok=' + response.ok + ' contentType=' + (response.headers.get('content-type')||'none'));

          if (!response.ok) {
            // Leggi il body di errore come testo
            const errBody = await response.text();
            console.error('[DEBUG sendMessage] FETCH non-OK body:', errBody.substring(0, 500));
            clearInterval(logInterval);
            if (aiBubble) aiBubble.textContent = 'Error ' + response.status + ': ' + errBody;
            break;
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let pending = '';
          let chunkCount = 0;
          console.log('[DEBUG sendMessage] STREAM reader created');

          while (true) {
            const { done, value } = await reader.read();
            if (done) {
              console.log('[DEBUG sendMessage] STREAM done totalChunks=' + chunkCount + ' aiBufferLen=' + aiBuffer.length);
              break;
            }
            chunkCount++;
            if (chunkCount === 1) {
              clearInterval(logInterval);
              console.log('[DEBUG sendMessage] STREAM first chunk arrived');
            }

            const data = pending + decoder.decode(value);
            pending = '';
            const lines = data.split('\n');

            for (let i = 0; i < lines.length - 1; i++) {
              const line = lines[i].trim();
              if (line.startsWith('data: ')) {
                const jsonStr = line.slice(6);
                if (jsonStr === '[DONE]') break;
                try {
                  const chunk = JSON.parse(jsonStr);
                  const delta = chunk.choices?.[0]?.delta;
                  if (!delta) continue;


                  // Handle content tokens
                  if (delta.content) {
                    aiBuffer += delta.content;
                    if (aiBubble) {
                      aiBubble.innerHTML = aiBuffer.replace(/\n/g, '<br/>');
                      // Auto-scroll durante lo streaming solo se l'utente è vicino al fondo
                      const wrapper = document.querySelector('.chat-messages-wrapper');
                      if (wrapper) {
                        const isNearBottom = (wrapper.scrollHeight - wrapper.scrollTop - wrapper.clientHeight) < 100;
                        if (isNearBottom) {
                          wrapper.scrollTo({ top: wrapper.scrollHeight, behavior: 'instant' });
                        }
                      }
                    }
                  }

                  // Handle tool calls
                  if (delta.tool_calls && delta.tool_calls.length > 0) {
                    for (const tc of delta.tool_calls) {
                      const idx = tc.index;
                      while (toolCallsCollected.length <= idx) {
                        toolCallsCollected.push({
                          id: null,
                          type: 'function',
                          function: { name: '', arguments: '' }
                        });
                      }
                      const target = toolCallsCollected[idx];
                      if (tc.id) target.id = tc.id;
                      if (tc.function?.name) target.function.name = tc.function.name;
                      if (tc.function?.arguments) {
                        target.function.arguments += tc.function.arguments;
                      }
                    }
                  }
                } catch(e) {}
              }
            }

            if (!data.endsWith('\n')) {
              pending = lines[lines.length - 1];
            }
          }

          // After streaming ends, check for tool calls
          if (toolCallsCollected.length > 0) {
            // Add assistant message with tool calls
            const assistantContent = aiBuffer.length > 0 ? aiBuffer : 'Then I will answer and show any content...';
            conversationHistory.push({
              role: 'assistant',
              content: assistantContent,
              tool_calls: toolCallsCollected
            });

            // Execute each tool and add results to history
            for (const tc of toolCallsCollected) {
              const toolName = tc.function.name;
              let toolArgs = {};
              try {
                toolArgs = JSON.parse(tc.function.arguments);
              } catch(e) { toolArgs = {}; }
              const toolId = tc.id;

              addChatMessage('system', '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-icon lucide lucide-wrench h-4 w-4" style="display:inline-block;vertical-align:middle;margin-right:8px"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg> Tool Call -> ' + toolName + '(' + tc.function.arguments + ')');

              const result = await executeTool(toolName, toolArgs);
              let displayContent = '';
              let modelContent = '';

              // --- Extract content for display (full output shown to user) ---
              if (result.error) {
                displayContent = 'Error: ' + result.error;
              } else if (result.content !== undefined) {
                displayContent = typeof result.content === 'string' ? result.content : JSON.stringify(result.content);
              } else {
                displayContent = JSON.stringify(result);
              }

              // Prepend exit_code prefix for display when non-zero
              if (result.exit_code !== undefined && result.exit_code !== 0 && !result.error) {
                displayContent = '[Exit code: ' + result.exit_code + ']\n' + displayContent;
              }

              // --- Extract content for model (summary when available) ---
              if (result.summary !== undefined) {
                // Summary already contains exit code info, use as-is
                modelContent = typeof result.summary === 'string' ? result.summary : JSON.stringify(result.summary);
              } else if (result.error) {
                modelContent = 'Error: ' + result.error;
              } else if (result.content !== undefined) {
                modelContent = typeof result.content === 'string' ? result.content : JSON.stringify(result.content);
                if (result.exit_code !== undefined && result.exit_code !== 0) {
                  modelContent = '[Exit code: ' + result.exit_code + ']\n' + modelContent;
                }
              } else {
                modelContent = JSON.stringify(result);
              }

              // Format and display tool result like TUI (--- and ***Title***)
              const toolTitle = (toolName === 'read' && toolArgs.file_path) ? toolArgs.file_path : toolName;
              const formattedResult = `--- \n ***${toolTitle}***: \n ${displayContent}`;
              addChatMessage('tool', formattedResult);

              conversationHistory.push({
                role: 'tool',
                tool_call_id: toolId,
                name: toolName,
                content: modelContent
              });
            }

            // Continue loop to send tool results back to model
            continue;
          } else {
            // No tool calls, normal response complete
            if (aiBuffer.length > 0) {
              // Clean response: if it's JSON with a content field, extract it
              let finalContent = aiBuffer;
              try {
                const parsed = JSON.parse(aiBuffer);
                if (parsed.content) {
                  finalContent = parsed.content;
                  // Update the displayed bubble to show cleaned content
                  if (aiBubble) aiBubble.textContent = finalContent;
                }
              } catch(e) {
                // Not JSON, keep original
              }
              conversationHistory.push({ role: 'assistant', content: finalContent });
            }
            break;
          }
        } catch (e) {
          console.error('[DEBUG sendMessage] CATCH error:', e.message, e.stack);
          clearInterval(logInterval);
          if (aiBubble) aiBubble.textContent = 'Error: ' + e.message;
          break;
        }
      }

      isProcessing = false;
    }

    // ============ MODEL SELECTOR DROPDOWN ============
    (function() {
      const btn = document.getElementById('model-selector-btn');
      const label = document.getElementById('model-selector-label');

      let models = [];
      let selectedModel = null;
      let isOpen = false;
      let dropdownEl = null;
      let modelsLoaded = false;

      async function fetchModels() {
        console.log('[DEBUG] fetchModels() - currentProvider:', currentProvider);
        try {
          label.textContent = 'Loading...';
          var pObj = getProviderObj(currentProvider);
          var providerName = pObj && pObj.source === 'config' ? pObj.name : '';
          var modelsUrl = '/api/models?provider=' + encodeURIComponent(currentProvider);
          if (providerName) {
            modelsUrl += '&providerName=' + encodeURIComponent(providerName);
          }
          //console.log('[DEBUG] fetchModels URL:', modelsUrl);
          const res = await fetchWithTimeout(modelsUrl, {}, 15000);
          //console.log('[DEBUG] fetchModels status:', res.status, res.statusText);
          const responseText = await res.text();
          //console.log('[DEBUG] fetchModels RAW response:', responseText);
          let data;
          try {
            data = JSON.parse(responseText);
          } catch(e) {
            console.error('[DEBUG] fetchModels JSON parse FAILED:', e.message);
            data = { data: [] };
          }
          
          // Save selection BEFORE updating models array
          const prevSelected = currentModel || selectedModel;
          
          models = data.data || [];
          //console.log('[DEBUG] fetchModels parsed models:', models.length, models);
          modelsLoaded = true;

          // Now find the currently loaded model from server response
          let foundLoadedModel = null;
          for (const m of models) {
            if (m.status && m.status.value === 'loaded') {
              foundLoadedModel = m.id;
              break;
            }
          }

          // Determine what to show as selected:
          // 1. If server says a model is loaded, use that
          // 2. Otherwise keep our previous selection
          // 3. Otherwise show nothing
          if (foundLoadedModel) {
            currentModel = foundLoadedModel;
            selectedModel = foundLoadedModel;
            label.textContent = foundLoadedModel;
          } else if (prevSelected) {
            currentModel = prevSelected;
            selectedModel = prevSelected;
            label.textContent = prevSelected;
          } else {
            currentModel = null;
            selectedModel = null;
            label.textContent = 'Select model';
          }
        } catch (e) {
          console.error('[DEBUG] fetchModels FAILED:', e.message);
          label.textContent = 'Select model';

      }

      // Fetch models on page load
      console.log('[DEBUG] Calling fetchModels() on page load');
      fetchModels();

      function createDropdown() {
        const dropdown = document.createElement('div');
        dropdown.className = 'dropdown';

        const btnRect = btn.getBoundingClientRect();
        // Open upward - position above the button
        dropdown.style.position = 'absolute';
        dropdown.style.bottom = (window.innerHeight - btnRect.top + 10) + 'px';
        dropdown.style.left = btnRect.left + 'px';
        dropdown.style.top = 'auto';

        // Search
        const searchDiv = document.createElement('div');
        searchDiv.className = 'dropdown-search';
        const searchInput = document.createElement('input');
        searchInput.type = 'text';
        searchInput.placeholder = 'Search models...';
        searchInput.addEventListener('input', (e) => renderList(e.target.value));
        searchDiv.appendChild(searchInput);
        dropdown.appendChild(searchDiv);

        // List
        const listDiv = document.createElement('div');
        listDiv.className = 'dropdown-list';
        listDiv.id = 'models-list';
        dropdown.appendChild(listDiv);

        const closeHandler = (e) => {
          if (!dropdown.contains(e.target) && !btn.contains(e.target)) closeDropdown();
        };
        setTimeout(() => document.addEventListener('click', closeHandler), 0);

        return dropdown;
      }

      function renderList(filter = '') {
        if (!dropdownEl) return;
        const listContainer = dropdownEl.querySelector('#models-list');
        if (!listContainer) return;

        listContainer.innerHTML = '';

        const filtered = models.filter(m => m.id.toLowerCase().includes(filter.toLowerCase()));

        if (filtered.length === 0) {
          const empty = document.createElement('p');
          empty.className = 'dropdown-empty';
          empty.textContent = 'No models found';
          listContainer.appendChild(empty);
          return;
        }

        filtered.forEach(model => {
          const item = document.createElement('button');
          item.className = 'dropdown-item';
          item.style.color = isDark ? '#f9fafb' : '#1f2937';
          if (model.id === selectedModel) item.classList.add('selected');

          const status = document.createElement('span');
          status.className = 'status';
          const modelStatus = model.status?.value || 'unloaded';
          if (modelStatus === 'loaded') status.classList.add('loaded');
          else if (modelStatus === 'loading') status.classList.add('loading');
          else status.classList.add('unloaded');
          item.appendChild(status);

          const name = document.createElement('span');
          name.className = 'name';
          name.textContent = model.id;
          name.style.color = isDark ? '#f9fafb' : '#1f2937';
          item.appendChild(name);

          item.addEventListener('click', () => selectModel(model.id));
          listContainer.appendChild(item);
        });
      }

      function openDropdown() {
        dropdownEl = createDropdown();
        document.body.appendChild(dropdownEl);
        isOpen = true;
        btn.setAttribute('aria-expanded', 'true');
        btn.setAttribute('data-state', 'open');
        // Render list immediately
        renderList();
      }

      function closeDropdown() {
        if (dropdownEl) {
          dropdownEl.remove();
          dropdownEl = null;
        }
        isOpen = false;
        btn.setAttribute('aria-expanded', 'false');
        btn.setAttribute('data-state', 'closed');
      }

      async function selectModel(modelId) {
        console.log('[DEBUG] selectModel() ->', modelId, 'currentProvider:', currentProvider);
        selectedModel = modelId;
        currentModel = modelId;
        label.textContent = modelId;

        const foundModel = models.find(m => m.id === modelId);
        const isLoaded = foundModel?.status?.value === 'loaded';

        if (isLoaded) {
          addChatMessage('system', 'OK Model already loaded: ' + modelId);
          closeDropdown();
          return;
        }

        addChatMessage('system', 'Loading model: ' + modelId + '...');

        // Close dropdown immediately
        closeDropdown();

        try {
          const embUrl = '/v1/embeddings?provider=' + encodeURIComponent(currentProvider);
          console.log('[DEBUG] selectModel POST URL:', embUrl);
          const body = JSON.stringify({ content: 'test', model: modelId });
          console.log('[DEBUG] selectModel POST body:', body);
          const response = await fetch(embUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: body
          });
          console.log('[DEBUG] selectModel response status:', response.status, response.statusText);
          const respText = await response.text();
          console.log('[DEBUG] selectModel response body:', respText);

          if (response.ok) {
            addChatMessage('system', 'OK Model loaded: ' + modelId);
          } else {
            addChatMessage('system', modelId === 'llamaserver missing'
              ? 'Failed, use toolbar to launch...'
              : 'OK Model selected: ' + modelId);
          }
          await fetchModels();
        } catch (e) {
          console.error('[DEBUG] selectModel fetch FAILED:', e.message);
          addChatMessage('system', modelId === 'llamaserver missing'
            ? 'Failed, use toolbar to launch...'
            : 'OK Model selected: ' + modelId);
        }
      }

      btn.addEventListener('click', async (e) => {
        console.log('[DEBUG] MODELS-DROPDOWN CLICK: isOpen=' + isOpen + ' modelsLoaded=' + modelsLoaded + ' models.length=' + models.length);
        e.stopPropagation();
        if (isOpen) {
          closeDropdown();
        } else {
          // Always try to fetch models if we have none, even if modelsLoaded is true.
          // This handles the case where llamaserver wasn't running on page load but is now.
          if (!modelsLoaded || models.length === 0) {
            console.log('[DEBUG] MODELS-DROPDOWN fetching models (modelsLoaded=' + modelsLoaded + ', models.length=' + models.length + ')');
            await fetchModels();
            console.log('[DEBUG] MODELS-DROPDOWN after fetchModels: models.length=' + models.length + ' modelsLoaded=' + modelsLoaded);
          } else {
            console.log('[DEBUG] MODELS-DROPDOWN modelsLoaded=true with ' + models.length + ' models, skipping fetchModels');
          }
          console.log('[DEBUG] MODELS-DROPDOWN checking models.length > 0:', models.length);
          if (models.length > 0) {
            openDropdown();
          } else {
            console.log('[DEBUG] MODELS-DROPDOWN models.length=0, still opening dropdown to show message');
            openDropdown();
          }
        }
      });

      btn.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowDown' || e.key === 'Enter') {
          e.preventDefault();
          if (!modelsLoaded || models.length === 0) {
            fetchModels().then(openDropdown);
          } else {
            openDropdown();
          }
        }
      });

      // Listen for provider changes
      window.addEventListener('provider-changed', async (e) => {
        console.log('[DEBUG] provider-changed event:', e.detail);
        console.log('[DEBUG] currentProvider after change:', currentProvider);
        modelsLoaded = false;
        selectedModel = null;
        currentModel = null;
        models = [];
        await fetchModels();
      });
    })();
    // ============ DIRECTORY BROWSER ============
    var currentDir = '';
    var dirHistory = [];

    function renderDirEntries(data) {
      const pathDiv = document.getElementById('dir-path');
      const entriesDiv = document.getElementById('dir-entries');
      currentDir = data.path || '';
      pathDiv.textContent = currentDir;
      entriesDiv.innerHTML = '';

      // Up button if we can go up (always unless at root)
      const up = document.createElement('div');
      up.className = 'dir-entry dir-entry-dir';
      up.innerHTML = '<span class="dir-icon">📁</span> ..';
      up.addEventListener('click', () => {
        goUp();
      });
      entriesDiv.appendChild(up);

        var entries = data.entries || [];
        // Sort: dirs first, then files, alphabetically
        entries.sort(function(a, b) {
          if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
          return a.name.localeCompare(b.name);
        });

        entries.forEach(function(entry) {
          const el = document.createElement('div');
          if (entry.type === 'dir') {
            el.className = 'dir-entry dir-entry-dir';
            el.innerHTML = '<span class="dir-icon">📁</span> ' + entry.name + '/';
            el.addEventListener('click', function(dirName) {
              return function() { navigateInto(dirName); };
            }(entry.name));
          } else {
            el.className = 'dir-entry dir-entry-file';
            var sizeStr = entry.size !== undefined ? ' (' + formatSize(entry.size) + ')' : '';
            el.innerHTML = '<span class="dir-icon">📄</span> ' + entry.name + sizeStr;
            el.addEventListener('click', function(fname) {
              return function() { openFile(fname); };
            }(entry.name));
          }
          entriesDiv.appendChild(el);
        });

        if (entries.length === 0) {
          entriesDiv.innerHTML = '<div class="dir-empty">(empty directory)</div>';
        }
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
        return (bytes/1024/1024).toFixed(1) + ' MB';
      }

      function loadDir() {
        fetch('/api/list-dir')
          .then(function(res) { return res.json(); })
          .then(function(data) {
            renderDirEntries(data);
          })
          .catch(function(err) {
            console.error('Failed to load directory:', err);
            document.getElementById('dir-entries').innerHTML = '<div class="dir-empty">Error loading directory</div>';
          });

      function renderBookmarkEntries(bookmarks) {

      function navigateInto(subdir) {
        var newPath = currentDir + '/' + subdir;
        fetch('/api/cd?path=' + encodeURIComponent(newPath))

    // ============ SIDEBAR TOGGLE & RESIZE ============
    (function() {
      const sidebar = document.getElementById('sidebar-left');
      const toggleBtn = document.getElementById('sidebar-toggle-btn');
      const labels = document.querySelectorAll('.sidebar-label');
      const dirBrowser = document.getElementById('dir-browser');
      const resizeHandle = document.getElementById('sidebar-resize-handle');
      let isExpanded = false;
      // Restore saved width or default to 240px (15rem)
      let savedSidebarWidth = parseInt(localStorage.getItem('sidebarWidth')) || 240;

      toggleBtn.addEventListener('click', () => {
        isExpanded = !isExpanded;
        if (isExpanded) {
          sidebar.style.width = savedSidebarWidth + 'px';
          sidebar.classList.add('sidebar-expanded');
          sidebar.style.overflowY = 'auto';
          labels.forEach(label => label.style.display = 'inline');
          if (resizeHandle) resizeHandle.style.display = 'block';
          var bookmarksDiv = document.getElementById('sidebar-bookmarks');
          if (bookmarksDiv) {
            bookmarksDiv.style.display = 'block';
            loadBookmarks();
          }
          if (dirBrowser) {
            dirBrowser.style.display = 'block';
            loadDir();
          }
        } else {
          sidebar.style.width = 'auto';
          sidebar.classList.remove('sidebar-expanded');
          sidebar.style.overflowY = '';
          labels.forEach(label => label.style.display = 'none');
          if (resizeHandle) resizeHandle.style.display = 'none';
          var bookmarksDiv = document.getElementById('sidebar-bookmarks');
          if (bookmarksDiv) {
            bookmarksDiv.style.display = 'none';
          }
          if (dirBrowser) {
            dirBrowser.style.display = 'none';
          }
        }
      });

      // ============ DRAG RESIZE ============
      let isDragging = false;

      function onResizeMouseDown(e) {
        if (!isExpanded) return;
        isDragging = true;
        sidebar.classList.add('sidebar-no-transition');
        resizeHandle.classList.add('dragging');
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'col-resize';
        e.preventDefault();
      }

      function onResizeMouseMove(e) {
        if (!isDragging) return;
        const newWidth = Math.max(180, Math.min(600, e.clientX));
        sidebar.style.width = newWidth + 'px';
        savedSidebarWidth = newWidth;
      }

      function onResizeMouseUp() {
        if (!isDragging) return;
        isDragging = false;
        sidebar.classList.remove('sidebar-no-transition');
        resizeHandle.classList.remove('dragging');
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
        localStorage.setItem('sidebarWidth', savedSidebarWidth);
      }

      if (resizeHandle) {
        resizeHandle.addEventListener('mousedown', onResizeMouseDown);
      }
      document.addEventListener('mousemove', onResizeMouseMove);
      document.addEventListener('mouseup', onResizeMouseUp);
    })();
  </script>
